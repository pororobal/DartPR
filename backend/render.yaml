services:
  - type: web
    name: DartPR
    runtime: python
    region: singapore
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install --only-binary pydantic-core pydantic-core && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENDART_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_NAME
        value: DART0s
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: POLL_INTERVAL_SECONDS
        value: "300"
      - key: FREE_TIER_DELAY_SECONDS
        value: "180"
